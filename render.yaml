services:
  - type: web
    name: n8n
    runtime: docker
    repo: https://github.com/BesmaInfoEnergy/n8n-hebergement
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: N8N_DATABASE_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_USER_FOLDER
        value: /home/node/.n8n

databases:
  - name: n8n-db
    databaseName: n8n
    plan: free
    user: n8n
    ipAllowList: []
